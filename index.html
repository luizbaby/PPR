<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPR 2026 - 1º Semestre</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --surface:    #f8f9fb;
    --surface2:   #f0f2f5;
    --border:     #e2e6ec;
    --border2:    #cbd2db;
    --text:       #1a1f2e;
    --muted:      #6b7a93;
    --stamp:      #0ea5a0;
    --stamp-dim:  #b2e4e2;
    --gold:       #c9960a;
    --gold-dim:   #f0d98a;
    --green:      #16a34a;
    --green-bg:   #dcfce7;
    --green-bd:   #86efac;
    --red:        #dc2626;
    --red-bg:     #fee2e2;
    --red-bd:     #fca5a5;
    --retail:     #ea580c;
    --resale:     #6d28d9;
    --teal:       #0ea5a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 32px 72px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 28px;
    border-bottom: 2px solid var(--border);
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-logo {
    height: 72px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 56px;
    background: var(--border2);
    flex-shrink: 0;
  }

  .header-titles {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-titles h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 3vw, 40px);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  .header-titles h1 span { color: var(--teal); }

  .header-semestre {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }

  .update-info {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.01em;
  }

  .update-info span { color: var(--green); font-weight: 600; }

  .refresh-btn {
    background: transparent;
    border: 1.5px solid var(--border2);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
    border-radius: 6px;
  }

  .refresh-btn:hover { border-color: var(--teal); color: var(--teal); background: rgba(14,165,160,0.05); }
  .refresh-btn .icon { font-size: 13px; }

  /* ── SECTION ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
  }

  .section-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── INDICATORS ── */
  .indicators-section { margin-bottom: 56px; }

  .indicators-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px) { .indicators-grid { grid-template-columns: 1fr; } }

  .indicator-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px 22px 22px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .indicator-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    border-color: var(--border2);
  }

  .indicator-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .ind-general::before { background: linear-gradient(90deg, var(--stamp), var(--gold)); }
  .ind-retail::before  { background: var(--retail); }
  .ind-resale::before  { background: var(--resale); }

  .ind-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ind-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-general { background: linear-gradient(135deg, var(--stamp), var(--gold)); }
  .dot-retail  { background: var(--retail); }
  .dot-resale  { background: var(--resale); }

  .ind-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .ind-sublabel {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .ind-value-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    white-space: nowrap;
  }

  .ind-value {
    font-family: 'Syne', sans-serif;
    font-size: clamp(20px, 2vw, 32px);
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }

  .ind-stamp  { color: var(--stamp); }
  .ind-gold   { color: var(--gold); }
  .ind-retail { color: var(--retail); }
  .ind-resale { color: var(--resale); }

  .trend { font-size: 18px; font-weight: 800; line-height: 1; }
  .trend-up      { color: var(--green); }
  .trend-down    { color: var(--red); }
  .trend-neutral { color: #c8d0db; font-size: 11px; }

  /* ── ACUMULADO ── */
  .acum-section { margin-bottom: 48px; }

  .acum-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 640px) { .acum-grid { grid-template-columns: 1fr; } }

  .acum-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 28px 26px;
    transition: box-shadow 0.2s;
  }

  .acum-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

  .acum-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .acum-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1.5px solid;
    margin-bottom: 8px;
    display: inline-block;
  }

  .badge-stamp { color: var(--stamp); border-color: var(--stamp-dim); background: rgba(14,165,160,0.07); }
  .badge-gold  { color: var(--gold);  border-color: var(--gold-dim);  background: rgba(201,150,10,0.07); }

  .acum-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--muted);
  }

  .acum-pct-badge {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid;
  }

  .pct-pos { color: var(--green); background: var(--green-bg); border-color: var(--green-bd); }
  .pct-neg { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bd);   }

  .progress-wrap {
    background: var(--border);
    height: 7px;
    border-radius: 99px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 99px;
    transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .bar-stamp { background: var(--stamp); }
  .bar-gold  { background: var(--gold); }
  .bar-over  { background: var(--green); }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--muted); }

  .acum-bottom {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .acum-saldo-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .acum-saldo-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── LOADING ── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .error-msg {
    display: none;
    background: var(--red-bg);
    border: 1.5px solid var(--red-bd);
    border-radius: 8px;
    padding: 14px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--red);
  }

  .error-msg.active { display: block; }

  footer {
    border-top: 1.5px solid var(--border);
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer p { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.03em; }

  .legend { display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); font-weight: 500; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate { animation: fadeUp 0.4s ease both; }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.2s; }

  @keyframes highlight {
    0%   { background: rgba(14,165,160,0.12); }
    100% { background: transparent; }
  }

  .changed { animation: highlight 1.4s ease forwards; }
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf//Z" alt="ARTS Papéis de Parede" />

        <h1>PPR <span>2026</span></h1>

    <div class="header-right">

        <span class="icon">↻</span> Atualizar

  <footer class="animate d3">
    <p>Dashboard PPR 2026 · 1º Semestre · ARTS Papéis de Parede</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,var(--stamp),var(--gold))"></div> Faturamento</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--retail)"></div> Vendas Varejo</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--resale)"></div> Vendas Revenda</div>
    </div>
  </footer>

</div>

<script>
const SHEET_ID   = '1AgqX9Sl8VXz8wDPqfQvoMnunTfFMTK1s';
const SHEET_NAME = 'Planilha1';

const FALLBACK = {
  stamp: [
    { mes:'Jan/26', total:294849.12, observado:210848.97, acumulado:-84000.15,   metaDia:null,     varejo:70500.00,  varejoObs:70998.26,  varejoDia:null,     revenda:212850.00, revendaObs:127739.39, revendaDia:null     },
    { mes:'Fev/26', total:360124.87, observado:323723.82, acumulado:-120401.20,  metaDia:null,     varejo:112800.00, varejoObs:100082.36, varejoDia:null,     revenda:233280.00, revendaObs:203604.16, revendaDia:null     },
    { mes:'Mar/26', total:422934.44, observado:466581.55, acumulado:-76754.09,   metaDia:null,     varejo:148050.00, varejoObs:150755.62, varejoDia:null,     revenda:258390.00, revendaObs:295307.49, revendaDia:null     },
    { mes:'Abr/26', total:423683.66, observado:219096.80, acumulado:-281340.95,  metaDia:26102.76, varejo:126900.00, varejoObs:46566.87,  varejoDia:7930.37,  revenda:280260.00, revendaObs:163753.93, revendaDia:17455.54 },
    { mes:'Mai/26', total:472663.89, observado:null,      acumulado:null,        metaDia:null,     varejo:148050.00, varejoObs:null,      varejoDia:null,     revenda:306180.00, revendaObs:null,      revendaDia:null     },
    { mes:'Jun/26', total:446722.16, observado:null,      acumulado:null,        metaDia:null,     varejo:126900.00, varejoObs:null,      varejoDia:null,     revenda:302400.00, revendaObs:null,      revendaDia:null     },
  ],
  gold: [
    { mes:'Jan/26', total:313858.88, observado:210848.97, acumulado:-103009.91,  metaDia:null,     varejo:75045.34,  varejoObs:70998.26,  varejoDia:null,     revenda:226573.05, revendaObs:127739.39, revendaDia:null     },
    { mes:'Fev/26', total:383343.15, observado:323723.82, acumulado:-162629.25,  metaDia:null,     varejo:120072.54, varejoObs:100082.36, varejoDia:null,     revenda:248320.23, revendaObs:203604.16, revendaDia:null     },
    { mes:'Mar/26', total:450202.24, observado:466581.55, acumulado:-146249.94,  metaDia:null,     varejo:157595.21, varejoObs:150755.62, varejoDia:null,     revenda:275049.14, revendaObs:295307.49, revendaDia:null     },
    { mes:'Abr/26', total:450999.76, observado:219096.80, acumulado:-378152.90,  metaDia:29495.97, varejo:135081.61, varejoObs:46566.87,  varejoDia:8958.01,  revenda:298329.17, revendaObs:163753.93, revendaDia:19688.77 },
    { mes:'Mai/26', total:503137.89, observado:null,      acumulado:null,        metaDia:null,     varejo:157595.21, varejoObs:null,      varejoDia:null,     revenda:325920.30, revendaObs:null,      revendaDia:null     },
    { mes:'Jun/26', total:475523.62, observado:null,      acumulado:null,        metaDia:null,     varejo:135081.61, varejoObs:null,      varejoDia:null,     revenda:321896.60, revendaObs:null,      revendaDia:null     },
  ],
};

let prev = {
  sGeral:null, gGeral:null,
  sVarejo:null, gVarejo:null,
  sRevenda:null, gRevenda:null,
  saldoStamp:null, saldoGold:null,
};

const fmt = v => v == null ? '—' : new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:2}).format(v);
const fmtShort = v => {
  if (v == null) return '—';
  const abs = Math.abs(v);
  if (abs >= 1e6) return 'R$ ' + (v/1e6).toFixed(2).replace('.',',') + 'M';
  if (abs >= 1e3) return 'R$ ' + (v/1e3).toFixed(1).replace('.',',') + 'K';
  return fmt(v);
};

function arrowMeta(curr, old) {
  if (old === null) return '<span class="trend trend-neutral">●</span>';
  if (curr == null) return '';
  if (curr < old) return '<span class="trend trend-up">↑</span>';
  if (curr > old) return '<span class="trend trend-down">↓</span>';
  return '<span class="trend trend-neutral">●</span>';
}

function arrowAcum(curr, old) {
  if (old === null) return '<span class="trend trend-neutral">●</span>';
  if (curr == null) return '';
  if (curr > old) return '<span class="trend trend-up">↑</span>';
  if (curr < old) return '<span class="trend trend-down">↓</span>';
  return '<span class="trend trend-neutral">●</span>';
}

function applyPulse(id, curr, old) {
  if (old !== null && curr !== old) {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('changed'); void el.offsetWidth; el.classList.add('changed'); }
  }
}

function parseCSV(csv) {
  try {
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.replace(/"/g,'').trim()));
    const pv = s => {
      if (!s || s==='' || s==='-') return null;
      const n = parseFloat(s.replace(/[R$\s.]/g,'').replace(',','.'));
      return isNaN(n) ? null : n;
    };
    const meses = ['Jan/26','Fev/26','Mar/26','Abr/26','Mai/26','Jun/26'];
    const sRows = [rows[2],rows[3],rows[4],rows[5],rows[6],rows[7]];
    const gRows = [rows[13],rows[14],rows[15],rows[16],rows[17],rows[18]];
    const map = (r,i) => ({
      mes:meses[i], total:pv(r[1]), observado:pv(r[2]), acumulado:pv(r[3]),
      metaDia:pv(r[4]),
      varejo:pv(r[6]), varejoObs:pv(r[7]), varejoDia:pv(r[8]),
      revenda:pv(r[10]), revendaObs:pv(r[11]), revendaDia:pv(r[12]),
    });
    return { stamp: sRows.map(map), gold: gRows.map(map) };
  } catch(e) { return null; }
}

async function loadData() {
  document.getElementById('loadingOverlay').classList.add('active');
  document.getElementById('errorMsg').classList.remove('active');
  let data = FALLBACK;
  try {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMkfvgmovKj24X7nQl0jT1egdqOC4HhABtMhrQchjJ5ADel-_T8_Z_DIYeLnQIng/pub?gid=434821545&single=true&output=csv';
    const res = await fetch(url);
    if (res.ok) {
      const parsed = parseCSV(await res.text());
      if (parsed) data = parsed;
    }
  } catch(e) { console.warn('Usando dados embutidos'); }
  document.getElementById('loadingOverlay').classList.remove('active');
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('pt-BR');
  render(data);
}

function render(data) {
  const { stamp, gold } = data;
  const ci = stamp.reduce((acc,m,i) => m.metaDia != null ? i : acc, 0);
  const cs = stamp[ci];
  const cg = gold[ci];

  document.getElementById('mesVigente').textContent = cs?.mes || '—';

  document.getElementById('indicatorsGrid').innerHTML = `
    <div class="indicator-card ind-general">
      <div class="ind-label"><div class="ind-dot dot-general"></div> Meta de Faturamento</div>
      <div class="ind-pair">
        <div>
          <div class="ind-sublabel">🏅 Estampa de Sucesso</div>
          <div class="ind-value-wrap">
            <span class="ind-value ind-stamp" id="vSG">${fmtShort(cs?.metaDia)}</span>
            ${arrowMeta(cs?.metaDia, prev.sGeral)}
          </div>
        </div>
        <div>
          <div class="ind-sublabel">🥇 Papel de Ouro</div>
          <div class="ind-value-wrap">
            <span class="ind-value ind-gold" id="vGG">${fmtShort(cg?.metaDia)}</span>
            ${arrowMeta(cg?.metaDia, prev.gGeral)}
          </div>
        </div>
      </div>
    </div>
    <div class="indicator-card ind-retail">
      <div class="ind-label"><div class="ind-dot dot-retail"></div> Vendas Varejo</div>
      <div class="ind-pair">
        <div>
          <div class="ind-sublabel">🏅 Estampa de Sucesso</div>
          <div class="ind-value-wrap">
            <span class="ind-value ind-retail" id="vSV">${fmtShort(cs?.varejoDia)}</span>
            ${arrowMeta(cs?.varejoDia, prev.sVarejo)}
          </div>
        </div>
        <div>
          <div class="ind-sublabel">🥇 Papel de Ouro</div>
          <div class="ind-value-wrap">
            <span class="ind-value" style="color:color-mix(in srgb,var(--retail) 55%,var(--gold))" id="vGV">${fmtShort(cg?.varejoDia)}</span>
            ${arrowMeta(cg?.varejoDia, prev.gVarejo)}
          </div>
        </div>
      </div>
    </div>
    <div class="indicator-card ind-resale">
      <div class="ind-label"><div class="ind-dot dot-resale"></div> Vendas Revenda</div>
      <div class="ind-pair">
        <div>
          <div class="ind-sublabel">🏅 Estampa de Sucesso</div>
          <div class="ind-value-wrap">
            <span class="ind-value ind-resale" id="vSR">${fmtShort(cs?.revendaDia)}</span>
            ${arrowMeta(cs?.revendaDia, prev.sRevenda)}
          </div>
        </div>
        <div>
          <div class="ind-sublabel">🥇 Papel de Ouro</div>
          <div class="ind-value-wrap">
            <span class="ind-value" style="color:color-mix(in srgb,var(--resale) 55%,var(--gold))" id="vGR">${fmtShort(cg?.revendaDia)}</span>
            ${arrowMeta(cg?.revendaDia, prev.gRevenda)}
          </div>
        </div>
      </div>
    </div>
  `;

  applyPulse('vSG', cs?.metaDia,    prev.sGeral);
  applyPulse('vGG', cg?.metaDia,    prev.gGeral);
  applyPulse('vSV', cs?.varejoDia,  prev.sVarejo);
  applyPulse('vGV', cg?.varejoDia,  prev.gVarejo);
  applyPulse('vSR', cs?.revendaDia, prev.sRevenda);
  applyPulse('vGR', cg?.revendaDia, prev.gRevenda);

  prev = {
    sGeral:   cs?.metaDia,    gGeral:   cg?.metaDia,
    sVarejo:  cs?.varejoDia,  gVarejo:  cg?.varejoDia,
    sRevenda: cs?.revendaDia, gRevenda: cg?.revendaDia,
    saldoStamp: prev._nextSaldoStamp ?? null,
    saldoGold:  prev._nextSaldoGold  ?? null,
  };

  const obsAcum       = stamp.filter(m=>m.observado!=null).reduce((s,m)=>s+m.observado,0);
  const metaAcumStamp = stamp.filter(m=>m.observado!=null).reduce((s,m)=>s+m.total,0);
  const metaAcumGold  = gold.filter(m=>m.observado!=null).reduce((s,m)=>s+m.total,0);
  const pAS = obsAcum / metaAcumStamp * 100;
  const pAG = obsAcum / metaAcumGold  * 100;
  const saldoStamp = obsAcum - metaAcumStamp;
  const saldoGold  = obsAcum - metaAcumGold;

  prev._nextSaldoStamp = saldoStamp;
  prev._nextSaldoGold  = saldoGold;

  const acumCard = (badge, bc, barClass, pA, metaA, saldo, prevSaldo) => {
    const pctRelativa = (saldo / metaA) * 100;
    const isPos = pctRelativa >= 0;
    const pctLabel = (isPos ? '+' : '') + pctRelativa.toFixed(1).replace('.',',') + '%';
    return `
    <div class="acum-card">
      <div class="acum-top">
        <div>
          <span class="acum-badge ${bc}">${badge}</span>
          <div class="acum-title">Acumulado vs Meta</div>
        </div>
        <span class="acum-pct-badge ${isPos ? 'pct-pos' : 'pct-neg'}">${pctLabel}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar ${pA>=100?'bar-over':barClass}" style="width:${Math.min(pA,100)}%"></div>
      </div>
      <div class="acum-bottom">
        <div>
          <div class="acum-saldo-label">Saldo acumulado</div>
          <div class="acum-saldo-val ${isPos ? 'pos' : 'neg'}">
            ${fmt(saldo)}
            ${arrowAcum(saldo, prevSaldo)}
          </div>
        </div>
      </div>
    </div>`;
  };

  document.getElementById('acumGrid').innerHTML =
    acumCard('🏅 Estampa de Sucesso','badge-stamp','bar-stamp',pAS,metaAcumStamp,saldoStamp,prev.saldoStamp) +
    acumCard('🥇 Papel de Ouro',     'badge-gold', 'bar-gold', pAG,metaAcumGold, saldoGold, prev.saldoGold);
}

loadData();
</script>
</body>
